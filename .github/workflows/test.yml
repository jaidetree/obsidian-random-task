name: Test

on:
    push:
        branches: ['**']
    pull_request:
        branches: ['**']

jobs:
    unit:
        name: Unit tests (vitest)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22.x
                  cache: 'npm'
            - run: npm ci
            - run: npm test

    e2e:
        name: E2E tests (wdio-obsidian-service)
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-node@v6
              with:
                  node-version: 22.x
                  cache: 'npm'

            - run: npm ci

            # The plugin's main.js must exist so the service can install it.
            - run: npm run build

            # Obsidian downloads are large; cache them between runs. No binaryPath
            # is set in CI (OBSIDIAN_BINARY_PATH unset), so the launcher downloads
            # the pinned version into .obsidian-cache.
            - name: Cache Obsidian binaries
              uses: actions/cache@v4
              with:
                  path: .obsidian-cache
                  key: obsidian-cache-${{ runner.os }}-${{ hashFiles('manifest.json', 'wdio.conf.mts', 'package-lock.json') }}
                  restore-keys: |
                      obsidian-cache-${{ runner.os }}-

            # Obsidian is an Electron GUI app; give it a virtual display and a
            # window manager on the headless Linux runner.
            - name: Install virtual display
              run: |
                  sudo apt-get update
                  sudo apt-get install -y xvfb herbstluftwm

            - name: Run E2E tests
              env:
                  WDIO_MAX_INSTANCES: 2
              run: |
                  export DISPLAY=:0
                  Xvfb :0 -screen 0 1280x1024x24 &
                  sleep 2
                  herbstluftwm &
                  sleep 2
                  npm run test:e2e
